<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1A4731">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Caja Mágica">
<meta name="description" content="Tesorería conversacional de KYNEX Ventures — Kent Díaz. Registra ingresos y egresos con lenguaje natural.">
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/icons/icon-192.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<title>Caja Mágica — KYNEX Ventures</title>
<style>
/* ══════════════════════════════════════════════════════════════════════════
   CAJA MÁGICA — Emerald Obsidian Design System
   Inspired by Google Stitch AI generation + custom premium fintech aesthetic.
   ══════════════════════════════════════════════════════════════════════════ */

:root {
  --bg: #080A0F;
  --bg-grad: linear-gradient(145deg, #080A0F 0%, #0D1117 40%, #0F1520 100%);
  --surface: rgba(22, 27, 40, 0.65);
  --surface-solid: #161B28;
  --surface2: rgba(30, 36, 54, 0.7);
  --surface3: rgba(40, 48, 68, 0.5);
  --glass: rgba(26, 71, 49, 0.08);
  --glass-border: rgba(46, 204, 113, 0.12);
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.14);
  --accent: #1A4731;
  --accent-mid: #225C3F;
  --accent-light: #2ECC71;
  --accent-glow: rgba(46, 204, 113, 0.25);
  --green: #2ECC71;
  --green-dim: rgba(46,204,113,0.15);
  --red: #E74C3C;
  --red-dim: rgba(231,76,60,0.12);
  --yellow: #F1C40F;
  --yellow-dim: rgba(241,196,15,0.12);
  --blue: #3498DB;
  --blue-dim: rgba(52,152,219,0.12);
  --text: #F0F2F5;
  --text2: #9CA3AF;
  --text3: #5C6370;
  --r: 16px;
  --r-sm: 10px;
  --r-lg: 24px;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.25);
  --shadow-md: 0 8px 32px rgba(0,0,0,0.35);
  --shadow-glow: 0 0 40px rgba(46,204,113,0.08);
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg-grad);
  color: var(--text);
  min-height: 100vh;
  overflow: hidden;
  position: relative;
}

/* ─── Animated background particles ─── */
#particles-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ─── Ambient glow orbs ─── */
.glow-orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.07;
  pointer-events: none;
  z-index: 0;
}
.glow-orb.g1 { width: 400px; height: 400px; background: var(--accent-light); top: -100px; left: -100px; animation: orbFloat1 20s ease-in-out infinite; }
.glow-orb.g2 { width: 300px; height: 300px; background: #3498DB; bottom: -50px; right: -50px; animation: orbFloat2 25s ease-in-out infinite; }
.glow-orb.g3 { width: 200px; height: 200px; background: var(--yellow); top: 50%; left: 50%; animation: orbFloat3 18s ease-in-out infinite; }

@keyframes orbFloat1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(60px, 40px); } }
@keyframes orbFloat2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-40px, -60px); } }
@keyframes orbFloat3 { 0%,100% { transform: translate(-50%,-50%) scale(1); } 50% { transform: translate(-50%,-50%) scale(1.3); } }

/* ─── Layout ─── */
#app {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
}

/* ─── Header ─── */
header {
  height: 60px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: var(--surface);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid var(--border);
  z-index: 20;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px; color: white;
  box-shadow: 0 0 16px rgba(46,204,113,0.2);
}
.logo-text {
  font-weight: 600;
  font-size: 17px;
  background: linear-gradient(135deg, var(--text) 0%, var(--accent-light) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.pulse-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--accent-glow);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }

.header-right { display: flex; align-items: center; gap: 14px; }
.sub-text { font-size: 11px; color: var(--text3); font-weight: 500; letter-spacing: 1.2px; text-transform: uppercase; }
.btn-config {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text3);
  font-size: 16px;
  cursor: pointer;
  padding: 6px 10px;
  border-radius: var(--r-sm);
  transition: var(--transition);
  line-height: 1;
}
.btn-config:hover { color: var(--text); border-color: var(--border-hover); background: var(--surface3); }

/* ─── Main panels ─── */
main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ─── Chat panel ─── */
.panel-chat {
  width: 400px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  background: var(--surface);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.chat-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.chat-header-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-light); }
.chat-header-text { font-size: 12px; color: var(--text2); font-weight: 500; }

/* Messages */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.08) transparent;
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

.msg {
  max-width: 88%;
  padding: 10px 16px;
  font-size: 13px;
  line-height: 1.6;
  animation: msgAppear 0.3s ease-out;
  word-break: break-word;
}
@keyframes msgAppear {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg-user {
  align-self: flex-end;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-mid) 100%);
  color: white;
  border-radius: 16px 16px 4px 16px;
  box-shadow: 0 2px 12px rgba(26,71,49,0.3);
}
.msg-bot {
  align-self: flex-start;
  background: var(--surface2);
  border: 1px solid var(--glass-border);
  color: var(--text);
  border-radius: 16px 16px 16px 4px;
  backdrop-filter: blur(8px);
}
.msg-loading { color: var(--text3); font-style: italic; }
.dots span { animation: blink 1.4s linear infinite; }
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100% { opacity: 0; } 40% { opacity: 1; } }

/* Chips */
.chips-row {
  display: flex;
  gap: 8px;
  padding: 10px 16px;
  overflow-x: auto;
  white-space: nowrap;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  border-top: 1px solid var(--border);
}
.chips-row::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 12px;
  color: var(--text3);
  cursor: pointer;
  transition: var(--transition);
  user-select: none;
}
.chip:hover {
  border-color: var(--glass-border);
  color: var(--text2);
  background: var(--glass);
}
.chip:active { transform: scale(0.96); }

/* Input area */
.input-area {
  padding: 12px 16px;
  display: flex;
  gap: 10px;
  align-items: flex-end;
  background: var(--surface-solid);
  border-top: 1px solid var(--border);
}
.input-area textarea {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 10px 14px;
  color: var(--text);
  font-size: 16px;
  font-family: inherit;
  resize: none;
  min-height: 42px;
  max-height: 120px;
  line-height: 1.5;
  outline: none;
  transition: var(--transition);
}
.input-area textarea::placeholder { color: var(--text3); }
.input-area textarea:focus { border-color: var(--glass-border); box-shadow: 0 0 0 3px rgba(46,204,113,0.06); }

#btn-send {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-mid) 100%);
  color: white;
  border: none;
  border-radius: var(--r-sm);
  padding: 10px 20px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  min-height: 42px;
  min-width: 80px;
  flex-shrink: 0;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
#btn-send::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1));
  opacity: 0;
  transition: var(--transition);
}
#btn-send:hover::after { opacity: 1; }
#btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
#btn-send:active:not(:disabled) { transform: scale(0.97); }

/* ─── Dashboard panel ─── */
.panel-dash {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 20px 24px;
  gap: 20px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.06) transparent;
}
.panel-dash::-webkit-scrollbar { width: 4px; }
.panel-dash::-webkit-scrollbar-track { background: transparent; }
.panel-dash::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

/* Dashboard title */
.dash-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.dash-title h2 {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.dash-title h2 .live-badge {
  font-size: 9px;
  padding: 2px 8px;
  border-radius: 12px;
  background: var(--green-dim);
  color: var(--green);
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
}

/* Metrics */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
}
.metric-card {
  background: var(--surface);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 18px 20px;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
.metric-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent-light), transparent);
  opacity: 0;
  transition: var(--transition);
}
.metric-card:hover { border-color: var(--glass-border); box-shadow: var(--shadow-glow); }
.metric-card:hover::before { opacity: 1; }

.m-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  margin-bottom: 12px;
}
.m-icon.ic-caja { background: var(--green-dim); }
.m-icon.ic-neto { background: var(--blue-dim); }
.m-icon.ic-ing { background: rgba(46,204,113,0.08); }
.m-icon.ic-egr { background: var(--red-dim); }

.m-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.m-value { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; transition: color var(--transition); }
.m-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

/* Semáforo */
.semaforo {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  backdrop-filter: blur(8px);
}
.sem-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  transition: background var(--transition);
  flex-shrink: 0;
}
.sem-dot.pulse-fast { animation: semPulse 0.8s infinite; }
@keyframes semPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.4); box-shadow: 0 0 12px var(--red); } }
#sem-msg { font-size: 13px; color: var(--text2); }

/* Actions row */
.actions-row {
  display: flex;
  gap: 12px;
  align-items: center;
}
.btn-export {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-mid) 100%);
  color: white;
  border: none;
  border-radius: var(--r-sm);
  padding: 12px 24px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  display: flex; align-items: center; gap: 8px;
  position: relative;
  overflow: hidden;
}
.btn-export::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent, rgba(255,255,255,0.12));
  opacity: 0;
  transition: var(--transition);
}
.btn-export:hover::after { opacity: 1; }
.btn-export:hover { box-shadow: 0 4px 20px rgba(26,71,49,0.4); }
.btn-export:disabled { opacity: 0.6; cursor: wait; }

.mes-selector {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 10px 14px;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  cursor: pointer;
}

/* Log section */
.log-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.log-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.log-count {
  background: var(--surface3);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
}

#log-list {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.06) transparent;
}
#log-list::-webkit-scrollbar { width: 3px; }
#log-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

.log-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  transition: var(--transition);
  border-radius: var(--r-sm);
  margin-bottom: 2px;
}
.log-item:hover { background: var(--surface2); }

.badge {
  font-size: 10px;
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 600;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  flex-shrink: 0;
}
.badge-ingreso { background: var(--green-dim); color: var(--green); }
.badge-egreso { background: var(--red-dim); color: var(--red); }
.badge-ahorro { background: var(--blue-dim); color: var(--blue); }
.badge-proyeccion { background: var(--yellow-dim); color: var(--yellow); }

.log-desc {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 13px;
  color: var(--text2);
}
.log-amt { font-weight: 600; white-space: nowrap; font-size: 13px; font-variant-numeric: tabular-nums; }
.btn-del {
  background: transparent;
  border: none;
  color: var(--text3);
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
  min-width: 32px;
  min-height: 32px;
  line-height: 1;
  border-radius: 8px;
  transition: var(--transition);
  display: flex; align-items: center; justify-content: center;
}
.btn-del:hover { color: var(--red); background: var(--red-dim); }

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
  text-align: center;
  color: var(--text3);
}
.empty-icon {
  width: 64px; height: 64px;
  margin-bottom: 16px;
  opacity: 0.4;
}
.empty-state p { font-size: 14px; }

/* Category breakdown */
.cat-breakdown {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 4px 0;
}
.cat-pill {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
  display: flex; align-items: center; gap: 5px;
}
.cat-pill .cat-amt { color: var(--text); font-weight: 600; }

/* ─── Modal ─── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-card {
  background: var(--surface-solid);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 28px;
  width: min(420px, 92vw);
  box-shadow: var(--shadow-md);
  animation: modalSlide 0.3s ease;
}
@keyframes modalSlide { from { opacity: 0; transform: translateY(20px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
.modal-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
.modal-card label {
  display: flex;
  flex-direction: column;
  gap: 6px;
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 18px;
}
.modal-card input {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 10px 14px;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  outline: none;
  transition: var(--transition);
}
.modal-card input:focus { border-color: var(--glass-border); }
.modal-btns {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}
.modal-btns button {
  padding: 10px 22px;
  border-radius: var(--r-sm);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
}
.btn-modal-save {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-mid) 100%);
  color: white;
  border: none;
}
.btn-modal-save:hover { box-shadow: 0 4px 16px rgba(26,71,49,0.4); }
.btn-modal-cancel {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text2);
}
.btn-modal-cancel:hover { border-color: var(--border-hover); color: var(--text); }

/* ─── Mobile responsive ─── */
@media (max-width: 768px) {
  header { padding: 0 16px; height: 52px; }
  .sub-text { display: none; }
  
  main { flex-direction: column; }
  
  .panel-dash {
    order: 1;
    padding: 14px 14px;
    gap: 14px;
    flex: 1;
    overflow-y: auto;
    padding-bottom: 340px;
  }
  
  .panel-chat {
    order: 2;
    width: 100%;
    height: auto;
    max-height: 320px;
    border-right: none;
    border-top: 1px solid var(--border);
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 50;
    background: var(--surface-solid);
  }
  .chat-header { display: none; }
  .chat-messages { max-height: 160px; padding: 10px; gap: 6px; }
  
  .input-area {
    position: relative;
    padding: 10px 12px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
  }
  
  .chips-row { padding: 6px 12px; }
  
  .metrics-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .metric-card { padding: 14px 16px; }
  .m-value { font-size: 18px; }
  
  .btn-export { width: 100%; justify-content: center; }
  .actions-row { flex-direction: column; }
}

@media (max-width: 380px) {
  .metrics-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .metric-card { padding: 12px; }
  .m-value { font-size: 16px; }
}

/* ─── Utility ─── */
.sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
</style>
</head>
<body>

<!-- Ambient glow orbs -->
<div class="glow-orb g1"></div>
<div class="glow-orb g2"></div>
<div class="glow-orb g3"></div>
<canvas id="particles-canvas"></canvas>

<div id="app">
  <!-- ═══ HEADER ═══ -->
  <header>
    <div class="logo">
      <div class="logo-icon">CM</div>
      <span class="logo-text">Caja Mágica</span>
      <div class="pulse-dot"></div>
    </div>
    <div class="header-right">
      <span class="sub-text">KYNEX Ventures</span>
      <button class="btn-config" onclick="toggleModal()" title="Configuración" id="btn-settings">⚙</button>
    </div>
  </header>

  <main>
    <!-- ═══ CHAT PANEL ═══ -->
    <section class="panel-chat" id="panel-chat">
      <div class="chat-header">
        <div class="chat-header-dot"></div>
        <span class="chat-header-text">Asistente de tesorería — lenguaje natural</span>

      <div class="chat-messages" id="chat-messages"></div>

      <div class="chips-row" id="chips-row">
        <span class="chip" data-text="mis papás me pasaron ">📥 Mesada</span>
        <span class="chip" data-text="gasté  en almuerzo y transporte">🍽 Comida/transp</span>
        <span class="chip" data-text="pagué la tarjeta Bancolombia completa por ">💳 Pago TC</span>
        <span class="chip" data-text="facturé  horas de consultoría a $25 USD">💼 Consultoría</span>
        <span class="chip" data-text="vendí una plantilla en Gumroad por $20 USD">💻 Gumroad</span>
        <span class="chip" data-text="pasé  a IBKR este mes">📈 IBKR</span>

      <div class="input-area">
        <textarea id="inp" placeholder="Ej: mis papás me pasaron 900k..." rows="1"></textarea>
        <button id="btn-send" onclick="enviar()">Enviar</button>

    <!-- ═══ DASHBOARD PANEL ═══ -->
    <section class="panel-dash" id="panel-dash">
      <div class="dash-title">
        <h2>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Market Intelligence
          <span class="live-badge">Live</span>

      </div>

      <!-- Métricas -->
      <div class="metrics-grid" id="metrics-grid">
        <div class="metric-card" id="card-caja">
          <div class="m-icon ic-caja">💰</div>
          <div class="m-label">Caja disponible</div>
          <div class="m-value" id="val-caja">— COP</div>
          <div class="m-sub" id="sub-caja"></div>
        </div>
        <div class="metric-card" id="card-neto">
          <div class="m-icon ic-neto">📊</div>
          <div class="m-label">Flujo neto</div>
          <div class="m-value" id="val-neto">— COP</div>
          <div class="m-sub" id="sub-neto"></div>
        </div>
        <div class="metric-card" id="card-ing">
          <div class="m-icon ic-ing">📈</div>
          <div class="m-label">Ingresos</div>
          <div class="m-value" id="val-ing" style="color:var(--green)">— COP</div>
          <div class="m-sub" id="sub-ing"></div>
        </div>
        <div class="metric-card" id="card-egr">
          <div class="m-icon ic-egr">📉</div>
          <div class="m-label">Egresos</div>
          <div class="m-value" id="val-egr" style="color:var(--red)">— COP</div>
          <div class="m-sub" id="sub-egr"></div>
        </div>
      </div>

      <!-- Semáforo -->
      <div class="semaforo" id="semaforo">
        <div class="sem-dot" id="sem-dot"></div>
        <span id="sem-msg">Sin movimientos aún</span>
      </div>

      <!-- Category breakdown -->
      <div class="cat-breakdown" id="cat-breakdown"></div>

      <!-- Actions -->
      <div class="actions-row">
        <button class="btn-export" id="btn-export" onclick="exportarExcel()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Exportar Excel
        </button>
      </div>

      <!-- Log de movimientos -->
      <div class="log-section">
        <div class="log-title">
          Movimientos del mes
          <span class="log-count" id="log-count">0</span>
        </div>
        <div id="log-list"></div>
      </div>
    </section>
  </main>
</div>

<!-- ═══ MODAL CONFIG ═══ -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal-card">
    <h3>⚙ Configuración</h3>
    <label>
      Tasa COP/USD
      <input type="number" id="cfg-tasa" placeholder="4200">
    </label>
    <label>
      Caja mínima COP (umbral de alerta)
      <input type="number" id="cfg-minima" placeholder="800000">
    </label>
    <div class="modal-btns">
      <button class="btn-modal-cancel" onclick="toggleModal()">Cancelar</button>
      <button class="btn-modal-save" onclick="guardarConfig()">Guardar</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════════════════════════
   CAJA MÁGICA — JavaScript Engine
   ══════════════════════════════════════════════════════════════════════════ */

// ─── Particle system ───────────────────────────────────────────────────────

(function initParticles() {
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  const PARTICLE_COUNT = 40;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.vx = (Math.random() - 0.5) * 0.3;
      this.vy = (Math.random() - 0.5) * 0.3;
      this.radius = Math.random() * 1.5 + 0.5;
      this.opacity = Math.random() * 0.15 + 0.03;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
      if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(46, 204, 113, ${this.opacity})`;
      ctx.fill();
    }
  }

  for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

  function drawConnections() {
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 150) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(46, 204, 113, ${0.03 * (1 - dist / 150)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    drawConnections();
    requestAnimationFrame(animate);
  }
  animate();
})();

// ─── State ─────────────────────────────────────────────────────────────────

const S = {
  movimientos: [],
  resumen: null,
  cargando: false
};

// ─── Init ──────────────────────────────────────────────────────────────────

async function init() {
  await Promise.all([cargarResumen(), cargarMovimientos()]);
  restaurarChat();
  registrarSW();
  setInterval(() => { cargarResumen(); cargarMovimientos(); }, 30000);
}

// ─── API helper ────────────────────────────────────────────────────────────

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  return r.json();
}

// ─── Enviar ────────────────────────────────────────────────────────────────

async function enviar() {
  const inp = document.getElementById('inp');
  const txt = inp.value.trim();
  if (!txt || S.cargando) return;
  inp.value = '';
  autoResize(inp);
  S.cargando = true;
  document.getElementById('btn-send').disabled = true;

  addMsg(txt, true);
  guardarChat(txt, true);
  const loadId = showLoading();

  try {
    const r = await api('POST', '/api/movimiento', { texto: txt });
    removeLoading(loadId);
    addMsg(r.mensaje, false);
    guardarChat(r.mensaje, false);
    if (r.ok) {
      await Promise.all([cargarResumen(), cargarMovimientos()]);
    }
  } catch(e) {
    removeLoading(loadId);
    addMsg('Error de conexión. Verifica que el servidor esté corriendo.', false);
  }

  S.cargando = false;
  document.getElementById('btn-send').disabled = false;
  document.getElementById('inp').focus();
}

// ─── Cargar datos ──────────────────────────────────────────────────────────

async function cargarResumen() {
  try {
    S.resumen = await api('GET', '/api/resumen');
    renderMetricas();
  } catch(e) { console.error('resumen error', e); }
}

async function cargarMovimientos() {
  try {
    S.movimientos = await api('GET', '/api/movimientos');
    renderLog();
  } catch(e) { console.error('movimientos error', e); }
}

// ─── Eliminar ──────────────────────────────────────────────────────────────

async function eliminar(id) {
  if (!confirm('¿Eliminar este movimiento?')) return;
  await api('DELETE', '/api/movimiento/' + id);
  await Promise.all([cargarResumen(), cargarMovimientos()]);
}

// ─── Exportar ──────────────────────────────────────────────────────────────

async function exportarExcel() {
  const btn = document.getElementById('btn-export');
  btn.innerHTML = '<span style="opacity:0.7">Generando...</span>';
  btn.disabled = true;
  try {
    const r = await fetch('/api/exportar');
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'CajaMagica_' + new Date().toISOString().slice(0,7) + '.xlsx';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch(e) { alert('Error al generar el Excel'); }
  btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Exportar Excel';
  btn.disabled = false;
}

// ─── Render métricas ───────────────────────────────────────────────────────

function renderMetricas() {
  if (!S.resumen) return;
  const r = S.resumen;

  document.getElementById('val-caja').textContent = fmtCOP(r.neto_cop);
  document.getElementById('val-neto').textContent = (r.neto_cop >= 0 ? '+' : '') + fmtCOP(r.neto_cop);
  document.getElementById('val-ing').textContent = '+' + fmtCOP(r.ingresos_cop);
  document.getElementById('val-egr').textContent = '-' + fmtCOP(r.egresos_cop);

  // Subs
  document.getElementById('sub-caja').textContent = r.total_movimientos + ' movimientos';
  document.getElementById('sub-neto').textContent = r.runway_meses < 99 ? 'Runway: ~' + r.runway_meses + ' días' : '';
  document.getElementById('sub-ing').textContent = r.total_movimientos > 0 ? 'Mes actual' : '';
  document.getElementById('sub-egr').textContent = r.ahorros_cop > 0 ? '(incl. ahorro ' + fmtCOP(r.ahorros_cop) + ')' : '';

  const colors = { verde: 'var(--green)', amarillo: 'var(--yellow)', rojo: 'var(--red)', sin_datos: 'var(--text3)' };
  const dot = document.getElementById('sem-dot');
  dot.style.background = colors[r.semaforo] || 'var(--text3)';
  dot.className = 'sem-dot' + (r.semaforo === 'rojo' ? ' pulse-fast' : '');
  document.getElementById('sem-msg').textContent = r.semaforo_mensaje || r.semaforo;
  document.getElementById('val-caja').style.color = colors[r.semaforo] || 'var(--text)';

  // Category breakdown
  const catDiv = document.getElementById('cat-breakdown');
  const cats = r.por_categoria || {};
  const catNames = {
    mesada: '👨‍👩‍👦 Mesada', consultoria: '💼 Consultoría', gumroad: '💻 Gumroad',
    scooters: '🛴 Scooters', ibkr: '📈 IBKR', nu: '🏦 Nu',
    tc_pago: '💳 TC', alimentacion: '🍽 Alimento', transporte: '🚌 Transp', otro: '📦 Otro'
  };
  if (Object.keys(cats).length > 0) {
    catDiv.innerHTML = Object.entries(cats).map(([k, v]) => 
      '<span class="cat-pill">' + (catNames[k] || k) + ' <span class="cat-amt">' + fmtCOP(v) + '</span></span>'
    ).join('');
  } else {
    catDiv.innerHTML = '';
  }
}

// ─── Render log ────────────────────────────────────────────────────────────

function renderLog() {
  const list = document.getElementById('log-list');
  const count = document.getElementById('log-count');
  count.textContent = S.movimientos.length;

  if (!S.movimientos.length) {
    list.innerHTML = '<div class="empty-state">' +
      '<svg class="empty-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">' +
      '<rect x="12" y="8" width="40" height="48" rx="4"/>' +
      '<line x1="20" y1="20" x2="44" y2="20"/><line x1="20" y1="28" x2="36" y2="28"/>' +
      '<line x1="20" y1="36" x2="40" y2="36"/><circle cx="44" cy="44" r="8"/>' +
      '<line x1="44" y1="40" x2="44" y2="48"/><line x1="40" y1="44" x2="48" y2="44"/></svg>' +
      '<p>Registra tu primer movimiento en el chat</p></div>';
    return;
  }

  const tipos = { ingreso: 'Ingreso', egreso: 'Egreso', ahorro: 'Ahorro', proyeccion: 'Proyección' };
  list.innerHTML = S.movimientos.map(m => {
    const sign = m.tipo === 'ingreso' ? '+' : m.tipo === 'ahorro' ? '~' : '-';
    const amtColor = m.tipo === 'ingreso' ? 'var(--green)' : m.tipo === 'proyeccion' ? 'var(--yellow)' : 'var(--red)';
    const amtStr = m.moneda === 'USD' ? sign + '$' + m.monto_original + ' USD' : sign + fmtCOP(m.monto_cop);
    return '<div class="log-item">' +
      '<span class="badge badge-' + m.tipo + '">' + (tipos[m.tipo] || m.tipo) + '</span>' +
      '<span class="log-desc" title="' + escapeHtml(m.descripcion) + '">' + escapeHtml(m.descripcion) + '</span>' +
      '<span class="log-amt" style="color:' + amtColor + '">' + amtStr + '</span>' +
      '<button class="btn-del" onclick="eliminar(\'' + m.id + '\')" title="Eliminar">×</button>' +
      '</div>';
  }).join('');
}

// ─── Chat helpers ──────────────────────────────────────────────────────────

function addMsg(txt, isUser) {
  const area = document.getElementById('chat-messages');
  const d = document.createElement('div');
  d.className = 'msg ' + (isUser ? 'msg-user' : 'msg-bot');
  d.textContent = txt;
  area.appendChild(d);
  area.scrollTop = area.scrollHeight;
}

function showLoading() {
  const area = document.getElementById('chat-messages');
  const d = document.createElement('div');
  const id = 'load-' + Date.now();
  d.id = id;
  d.className = 'msg msg-bot msg-loading';
  d.innerHTML = 'Clasificando<span class="dots"><span>.</span><span>.</span><span>.</span></span>';
  area.appendChild(d);
  area.scrollTop = area.scrollHeight;
  return id;
}

function removeLoading(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

// ─── Chat persistence ─────────────────────────────────────────────────────

const CHAT_KEY = 'cm_chat_v1';
function guardarChat(txt, isUser) {
  const hist = JSON.parse(localStorage.getItem(CHAT_KEY) || '[]');
  hist.push({ txt, isUser, ts: Date.now() });
  if (hist.length > 30) hist.splice(0, hist.length - 30);
  localStorage.setItem(CHAT_KEY, JSON.stringify(hist));
}

function restaurarChat() {
  const hist = JSON.parse(localStorage.getItem(CHAT_KEY) || '[]');
  if (hist.length) {
    hist.forEach(m => addMsg(m.txt, m.isUser));
  } else {
    addMsg('Listo. Escribe lo que entró o salió — en tus palabras. Los chips de arriba son atajos para lo más común.', false);
  }
}

// ─── Config modal ──────────────────────────────────────────────────────────

function toggleModal() {
  const m = document.getElementById('modal');
  m.style.display = m.style.display === 'none' ? 'flex' : 'none';
  if (m.style.display === 'flex' && S.resumen) {
    document.getElementById('cfg-tasa').value = S.resumen.tasa_cop_usd;
    document.getElementById('cfg-minima').value = S.resumen.caja_minima_cop;
  }
}

async function guardarConfig() {
  const tasa = parseInt(document.getElementById('cfg-tasa').value);
  const minima = parseInt(document.getElementById('cfg-minima').value);
  await api('POST', '/api/config', { tasa_cop_usd: tasa, caja_minima_cop: minima });
  toggleModal();
  await cargarResumen();
}

// ─── Utils ─────────────────────────────────────────────────────────────────

function fmtCOP(n) {
  return '$\u00a0' + Math.abs(Math.round(n)).toLocaleString('es-CO') + '\u00a0COP';
}

function autoResize(el) {
  el.style.height = '42px';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ─── Chips ─────────────────────────────────────────────────────────────────

document.querySelectorAll('.chip').forEach(c => {
  c.addEventListener('click', () => {
    const inp = document.getElementById('inp');
    inp.value = c.dataset.text;
    inp.focus();
    inp.setSelectionRange(inp.value.length, inp.value.length);
    autoResize(inp);
  });
});

// ─── Keyboard ──────────────────────────────────────────────────────────────

document.getElementById('inp').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
});
document.getElementById('inp').addEventListener('input', function() { autoResize(this); });

// ─── Modal overlay click ───────────────────────────────────────────────────

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) toggleModal();
});

// ─── Service Worker ────────────────────────────────────────────────────────

function registrarSW() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js')
      .catch(e => console.log('SW no registrado:', e));
  }
}

// ─── Start ─────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
